{{- if (index .Values.services "user-store-service").enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tensor-talks.fullname" . }}-user-store-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
    app.kubernetes.io/component: user-store-service
spec:
  replicas: {{ (index .Values.services "user-store-service").replicaCount }}
  selector:
    matchLabels:
      {{- include "tensor-talks.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: user-store-service
  template:
    metadata:
      labels:
        {{- include "tensor-talks.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: user-store-service
    spec:
      serviceAccountName: {{ include "tensor-talks.serviceAccountName" . }}
{{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: user-store-service
          image: {{ include "tensor-talks.image" (dict "Values" .Values "repository" (index .Values.services "user-store-service").image.repository "tag" (index .Values.services "user-store-service").image.tag) }}
          imagePullPolicy: {{ (index .Values.services "user-store-service").image.pullPolicy | default (include "tensor-talks.imagePullPolicy" .Values) }}
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          env:
            - name: USER_STORE_DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "tensor-talks.fullname" . }}-postgresql
                  key: host
            - name: USER_STORE_DATABASE_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "tensor-talks.fullname" . }}-postgresql
                  key: port
            - name: USER_STORE_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "tensor-talks.fullname" . }}-postgresql
                  key: user
            - name: USER_STORE_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "tensor-talks.fullname" . }}-postgresql
                  key: password
            - name: USER_STORE_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "tensor-talks.fullname" . }}-postgresql
                  key: database
            - name: USER_STORE_DATABASE_SSL_MODE
              valueFrom:
                secretKeyRef:
                  name: {{ include "tensor-talks.fullname" . }}-postgresql
                  key: sslmode
            - name: USER_STORE_DATABASE_SCHEMA
              value: {{ (index .Values.services "user-store-service").database.schema | quote }}
            - name: USER_STORE_SERVER_HOST
              value: "0.0.0.0"
            - name: USER_STORE_SERVER_PORT
              value: "8082"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml (index .Values.services "user-store-service").resources | nindent 12 }}
{{- end }}

