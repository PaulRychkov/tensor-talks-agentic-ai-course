{{- if (index .Values.services "interview-builder-service").enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tensor-talks.fullname" . }}-interview-builder-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
    app.kubernetes.io/component: interview-builder-service
spec:
  replicas: {{ (index .Values.services "interview-builder-service").replicaCount }}
  selector:
    matchLabels:
      {{- include "tensor-talks.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: interview-builder-service
  template:
    metadata:
      labels:
        {{- include "tensor-talks.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: interview-builder-service
        team: tensor-talks
        project: tensor-talks
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9093"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "tensor-talks.serviceAccountName" . }}
{{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: interview-builder-service
          image: {{ include "tensor-talks.image" (dict "Values" .Values "repository" (index .Values.services "interview-builder-service").image.repository "tag" (index .Values.services "interview-builder-service").image.tag) }}
          imagePullPolicy: {{ (index .Values.services "interview-builder-service").image.pullPolicy | default (include "tensor-talks.imagePullPolicy" .Values) }}
          ports:
            - name: http
              containerPort: 8089
              protocol: TCP
            - name: metrics
              containerPort: 9093
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "interview-builder-service"
            - name: SERVICE_VERSION
              value: "1.0.0"
            - name: LOG_LEVEL
              value: "INFO"
            - name: LOG_FORMAT
              value: "json"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: KAFKA_TOPIC_REQUEST
              value: "tensor-talks-interview.build.request"
            - name: KAFKA_TOPIC_RESPONSE
              value: "tensor-talks-interview.build.response"
            - name: KAFKA_CONSUMER_GROUP
              value: "tensor-talks-interview-builder-service-group"
            - name: QUESTIONS_CRUD_URL
              value: "http://{{ include "tensor-talks.fullname" . }}-questions-crud-service:8091"
            - name: KNOWLEDGE_BASE_CRUD_URL
              value: "http://{{ include "tensor-talks.fullname" . }}-knowledge-base-crud-service:8090"
            - name: SERVER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT
              value: "8089"
            - name: METRICS_PORT
              value: "9093"
            - name: ENABLE_PROMETHEUS
              value: "true"
            - name: QUESTIONS_PER_INTERVIEW
              value: "5"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml (index .Values.services "interview-builder-service").resources | nindent 12 }}
{{- end }}

