{{- if (index .Values.services "admin-frontend").enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tensor-talks.fullname" . }}-admin-frontend-nginx
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location /admin/ {
            proxy_pass http://{{ include "tensor-talks.fullname" . }}-admin-bff-service:8096/admin/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
{{- end }}
