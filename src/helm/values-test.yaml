# ── Ingress — test subdomain ──────────────────────────────────────────────────

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: test.tensor-talks.local
      paths:
        - path: /
          pathType: Prefix

# ── Istio — disabled in test ──────────────────────────────────────────────────

istio:
  enabled: false

serviceMonitor:
  enabled: false

serviceAccount:
  create: true
  annotations: {}
