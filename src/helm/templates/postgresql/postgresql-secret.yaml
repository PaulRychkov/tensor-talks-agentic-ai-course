{{- if and .Values.postgresql.deployment.enabled (not .Values.vault.enabled) }}
# Secret для локального PostgreSQL (создается только если vault.enabled = false)
# Если vault.enabled = true, секреты берутся из Vault через External Secrets
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tensor-talks.fullname" . }}-postgresql
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
type: Opaque
stringData:
  host: {{ include "tensor-talks.fullname" . }}-postgresql
  port: "5432"
  database: {{ .Values.postgresql.database | default "tensor_talks_db" | quote }}
  user: {{ .Values.postgresql.user | default "tensor_talks" | quote }}
  # ВАЖНО: Все секреты должны храниться в Vault!
  # Для локальной разработки (localDevelopment: true) можно использовать дефолт
  # В продакшене (localDevelopment: false) ОБЯЗАТЕЛЬНО из Vault!
  {{- if .Values.localDevelopment }}
  password: {{ .Values.postgresql.password | default "tensor-talks-dev-password" | quote }}
  {{- else }}
  password: {{ .Values.postgresql.password | required "PostgreSQL password должен быть указан в values.yaml или Vault для продакшена!" | quote }}
  {{- end }}
  sslmode: "disable"
{{- end }}
