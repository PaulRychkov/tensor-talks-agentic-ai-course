{{- if not .Values.vault.enabled }}
# ВАЖНО: Этот Secret создается только если vault.enabled = false
# Для продакшена рекомендуется использовать Vault (vault.enabled = true)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tensor-talks.fullname" . }}-llm-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ВАЖНО: LLM API key должен храниться в Vault!
  # Для локальной разработки (localDevelopment: true) можно использовать дефолт
  # В продакшене (localDevelopment: false) ОБЯЗАТЕЛЬНО из Vault!
  {{- if .Values.localDevelopment }}
  api-key: {{ (index .Values.services "interviewer-agent-service").llm.apiKey | default "dev-api-key" | quote }}
  {{- else }}
  api-key: {{ (index .Values.services "interviewer-agent-service").llm.apiKey | required "LLM API key должен быть указан в values.yaml или Vault для продакшена!" | quote }}
  {{- end }}
{{- end }}
