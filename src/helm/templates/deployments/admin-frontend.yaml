{{- if (index .Values.services "admin-frontend").enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tensor-talks.fullname" . }}-admin-frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin-frontend
spec:
  replicas: {{ (index .Values.services "admin-frontend").replicaCount }}
  selector:
    matchLabels:
      {{- include "tensor-talks.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: admin-frontend
  template:
    metadata:
      labels:
        {{- include "tensor-talks.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: admin-frontend
    spec:
      serviceAccountName: {{ include "tensor-talks.serviceAccountName" . }}
{{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "tensor-talks.fullname" . }}-admin-frontend-nginx
      containers:
        - name: admin-frontend
          image: {{ include "tensor-talks.image" (dict "Values" .Values "repository" (index .Values.services "admin-frontend").image.repository "tag" (index .Values.services "admin-frontend").image.tag) }}
          imagePullPolicy: {{ (index .Values.services "admin-frontend").image.pullPolicy | default (include "tensor-talks.imagePullPolicy" .Values) }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml (index .Values.services "admin-frontend").resources | nindent 12 }}
{{- end }}
