{{- if (index .Values.services "frontend").enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tensor-talks.fullname" . }}-frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ (index .Values.services "frontend").replicaCount }}
  selector:
    matchLabels:
      {{- include "tensor-talks.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "tensor-talks.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
        team: tensor-talks
        project: tensor-talks
    spec:
      serviceAccountName: {{ include "tensor-talks.serviceAccountName" . }}
{{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        # fsGroup автоматически установит права на volume для группы 101
      initContainers:
        - name: nginx-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /var/cache/nginx/client_temp
              mkdir -p /var/cache/nginx/proxy_temp
              mkdir -p /var/cache/nginx/fastcgi_temp
              mkdir -p /var/cache/nginx/uwsgi_temp
              mkdir -p /var/cache/nginx/scgi_temp
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
      containers:
        - name: frontend
          image: {{ include "tensor-talks.image" (dict "Values" .Values "repository" (index .Values.services "frontend").image.repository "tag" (index .Values.services "frontend").image.tag) }}
          imagePullPolicy: {{ (index .Values.services "frontend").image.pullPolicy | default (include "tensor-talks.imagePullPolicy" .Values) }}
          command: ["nginx"]
          args: ["-g", "daemon off;"]
          securityContext:
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
                - CHOWN
                - SETGID
                - SETUID
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-logs
              mountPath: /var/log/nginx
          resources:
            {{- toYaml (index .Values.services "frontend").resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "tensor-talks.fullname" . }}-frontend-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-logs
          emptyDir: {}
{{- end }}

