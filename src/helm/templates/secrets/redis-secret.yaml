{{- if not .Values.vault.enabled }}
# ВАЖНО: Этот Secret создается только если vault.enabled = false
# Для продакшена рекомендуется использовать Vault (vault.enabled = true)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tensor-talks.fullname" . }}-redis-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ВАЖНО: Redis password должен храниться в Vault!
  # Для локальной разработки (localDevelopment: true) можно использовать пустой пароль
  # В продакшене (localDevelopment: false) ОБЯЗАТЕЛЬНО из Vault!
  {{- if .Values.localDevelopment }}
  password: {{ .Values.redis.password | default "" | quote }}
  {{- else }}
  password: {{ .Values.redis.password | default "" | quote }}
  {{- end }}
{{- end }}
