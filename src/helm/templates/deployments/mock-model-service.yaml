{{- if (index .Values.services "mock-model-service").enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tensor-talks.fullname" . }}-dialogue-aggregator
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
    app.kubernetes.io/component: dialogue-aggregator
spec:
  replicas: {{ (index .Values.services "mock-model-service").replicaCount }}
  selector:
    matchLabels:
      {{- include "tensor-talks.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dialogue-aggregator
  template:
    metadata:
      labels:
        {{- include "tensor-talks.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dialogue-aggregator
        team: tensor-talks
        project: tensor-talks
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8084"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "tensor-talks.serviceAccountName" . }}
{{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: dialogue-aggregator
          image: {{ include "tensor-talks.image" (dict "Values" .Values "repository" (index .Values.services "mock-model-service").image.repository "tag" (index .Values.services "mock-model-service").image.tag) }}
          imagePullPolicy: {{ (index .Values.services "mock-model-service").image.pullPolicy | default (include "tensor-talks.imagePullPolicy" .Values) }}
          ports:
            - name: http
              containerPort: 8084
              protocol: TCP
          env:
            - name: MOCK_MODEL_SERVER_HOST
              value: "0.0.0.0"
            - name: MOCK_MODEL_SERVER_PORT
              value: "8084"
            - name: MOCK_MODEL_KAFKA_BROKERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: MOCK_MODEL_KAFKA_TOPIC_CHAT_OUT
              value: "tensor-talks-chat.events.out"
            - name: MOCK_MODEL_KAFKA_TOPIC_CHAT_IN
              value: "tensor-talks-chat.events.in"
            - name: MOCK_MODEL_KAFKA_CONSUMER_GROUP
              value: "tensor-talks-mock-model-service-group"
            - name: MOCK_MODEL_KAFKA_TOPIC_MESSAGES_FULL
              value: "messages.full.data"
            - name: MOCK_MODEL_KAFKA_TOPIC_GENERATED_PHRASES
              value: "generated.phrases"
            - name: MOCK_MODEL_KAFKA_AGENT_CONSUMER_GROUP
              value: "tensor-talks-mock-model-service-agent-group"
            - name: MOCK_MODEL_REDIS_ADDR
              value: "{{ include "tensor-talks.fullname" . }}-redis:6379"
            - name: MOCK_MODEL_REDIS_PASSWORD
              value: ""
            - name: MOCK_MODEL_REDIS_DB
              value: "0"
            - name: MOCK_MODEL_MODEL_QUESTION_DELAY_SECONDS
              value: "2"
            - name: MOCK_MODEL_SESSION_MANAGER_BASE_URL
              value: "http://{{ include "tensor-talks.fullname" . }}-session-service:8083"
            - name: MOCK_MODEL_SESSION_MANAGER_TIMEOUT_SECONDS
              value: "5"
            - name: MOCK_MODEL_CHAT_CRUD_BASE_URL
              value: "http://{{ include "tensor-talks.fullname" . }}-chat-crud-service:8087"
            - name: MOCK_MODEL_CHAT_CRUD_TIMEOUT_SECONDS
              value: "5"
            - name: MOCK_MODEL_RESULTS_CRUD_BASE_URL
              value: "http://{{ include "tensor-talks.fullname" . }}-results-crud-service:8088"
            - name: MOCK_MODEL_RESULTS_CRUD_TIMEOUT_SECONDS
              value: "5"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml (index .Values.services "mock-model-service").resources | nindent 12 }}
{{- end }}

