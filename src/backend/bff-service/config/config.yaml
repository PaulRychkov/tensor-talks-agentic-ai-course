server:
  host: "0.0.0.0"
  port: 8080

auth_service:
  base_url: "http://auth-service:8081"
  timeout_seconds: 5

session_service:
  base_url: "http://session-service:8083"
  timeout_seconds: 50  # Increased to allow time for interview program building (session-service waits 30s, need buffer)

session_crud:
  base_url: "http://session-crud-service:8085"
  timeout_seconds: 5

chat_crud:
  base_url: "http://chat-crud-service:8087"
  timeout_seconds: 5

results_crud:
  base_url: "http://results-crud-service:8088"
  timeout_seconds: 5

kafka:
  brokers: "kafka:9092"
  topic_chat_out: "team10-chat.events.out"  # Prefixed for Kubernetes shared cluster
  topic_chat_in: "team10-chat.events.in"    # Prefixed for Kubernetes shared cluster
  consumer_group: "team10-bff-service-group"  # Prefixed for Kubernetes shared cluster

cors:
  allow_origins:
    - "http://localhost:5173"
    - "http://frontend:5173"
  allow_headers:
    - "Content-Type"
    - "Authorization"

