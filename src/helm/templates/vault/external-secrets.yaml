{{- if .Values.vault.enabled }}
# ExternalSecret для PostgreSQL credentials из Vault
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tensor-talks.fullname" . }}-postgres
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.vault.refreshInterval | default "1h" }}
  secretStoreRef:
    name: vault-tensor-talks
    kind: SecretStore
  target:
    name: {{ include "tensor-talks.fullname" . }}-postgres
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: {{ .Values.vault.postgresql.path | default "tensor-talks/postgresql" }}
        property: host
    - secretKey: port
      remoteRef:
        key: {{ .Values.vault.postgresql.path | default "tensor-talks/postgresql" }}
        property: port
    - secretKey: database
      remoteRef:
        key: {{ .Values.vault.postgresql.path | default "tensor-talks/postgresql" }}
        property: database
    - secretKey: user
      remoteRef:
        key: {{ .Values.vault.postgresql.path | default "tensor-talks/postgresql" }}
        property: user
    - secretKey: password
      remoteRef:
        key: {{ .Values.vault.postgresql.path | default "tensor-talks/postgresql" }}
        property: password
    - secretKey: sslmode
      remoteRef:
        key: {{ .Values.vault.postgresql.path | default "tensor-talks/postgresql" }}
        property: sslmode

---
# ExternalSecret для JWT secrets из Vault
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tensor-talks.fullname" . }}-jwt
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.vault.refreshInterval | default "1h" }}
  secretStoreRef:
    name: vault-tensor-talks
    kind: SecretStore
  target:
    name: {{ include "tensor-talks.fullname" . }}-jwt
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        key: {{ .Values.vault.jwt.path | default "tensor-talks/jwt" }}
        property: secret
    - secretKey: issuer
      remoteRef:
        key: {{ .Values.vault.jwt.path | default "tensor-talks/jwt" }}
        property: issuer
    - secretKey: audience
      remoteRef:
        key: {{ .Values.vault.jwt.path | default "tensor-talks/jwt" }}
        property: audience

