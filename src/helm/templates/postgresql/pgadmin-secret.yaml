{{- if and .Values.postgresql.deployment.enabled .Values.postgresql.pgadmin.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tensor-talks.fullname" . }}-pgadmin
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgadmin
type: Opaque
stringData:
  # ВАЖНО: Все секреты должны храниться в Vault!
  # Для локальной разработки (localDevelopment: true) можно использовать дефолт
  # В продакшене (localDevelopment: false) ОБЯЗАТЕЛЬНО из Vault!
  # Рекомендуется добавить pgAdmin пароль в Vault: tensor-talks/pgadmin
  password: {{ .Values.postgresql.pgadmin.password | default "admin" | quote }}
{{- end }}
