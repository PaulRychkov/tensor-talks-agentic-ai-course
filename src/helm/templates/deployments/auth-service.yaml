{{- if (index .Values.services "auth-service").enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tensor-talks.fullname" . }}-auth-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth-service
spec:
  replicas: {{ (index .Values.services "auth-service").replicaCount }}
  selector:
    matchLabels:
      {{- include "tensor-talks.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: auth-service
  template:
    metadata:
      labels:
        {{- include "tensor-talks.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: auth-service
        team: tensor-talks
        project: tensor-talks
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"  # Путь для сбора метрик Prometheus
    spec:
      serviceAccountName: {{ include "tensor-talks.serviceAccountName" . }}
{{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: auth-service
          image: {{ include "tensor-talks.image" (dict "Values" .Values "repository" (index .Values.services "auth-service").image.repository "tag" (index .Values.services "auth-service").image.tag) }}
          imagePullPolicy: {{ (index .Values.services "auth-service").image.pullPolicy | default (include "tensor-talks.imagePullPolicy" .Values) }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: AUTH_SERVER_HOST
              value: "0.0.0.0"
            - name: AUTH_SERVER_PORT
              value: "8081"
            - name: AUTH_USER_STORE_BASE_URL
              value: "http://{{ include "tensor-talks.fullname" . }}-user-crud-service:8082"
            - name: AUTH_USER_STORE_TIMEOUT_SECONDS
              value: "5"
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "tensor-talks.fullname" . }}-jwt
                  key: secret
            - name: AUTH_JWT_ISSUER
              valueFrom:
                secretKeyRef:
                  name: {{ include "tensor-talks.fullname" . }}-jwt
                  key: issuer
            - name: AUTH_JWT_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: {{ include "tensor-talks.fullname" . }}-jwt
                  key: audience
            - name: AUTH_JWT_ACCESS_TOKEN_TTL
              value: {{ (index .Values.services "auth-service").jwt.accessTokenTTL | quote }}
            - name: AUTH_JWT_REFRESH_TOKEN_TTL
              value: {{ (index .Values.services "auth-service").jwt.refreshTokenTTL | quote }}
            - name: AUTH_REDIS_ADDR
              value: "{{ include "tensor-talks.fullname" . }}-redis:6379"
            - name: AUTH_REDIS_PASSWORD
              value: ""
            - name: AUTH_REDIS_DB
              value: "0"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml (index .Values.services "auth-service").resources | nindent 12 }}
{{- end }}

