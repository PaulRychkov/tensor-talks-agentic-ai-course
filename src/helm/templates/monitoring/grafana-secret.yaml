{{- if and .Values.monitoring.grafana.enabled (not .Values.vault.enabled) }}
# ВАЖНО: Этот Secret создается только если vault.enabled = false
# Если vault.enabled = true, секреты берутся из Vault через External Secrets
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tensor-talks.fullname" . }}-grafana
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
type: Opaque
stringData:
  # ВАЖНО: Все секреты должны храниться в Vault!
  # Для локальной разработки (localDevelopment: true) можно использовать дефолт
  # В продакшене (localDevelopment: false) ОБЯЗАТЕЛЬНО из Vault!
  {{- if .Values.localDevelopment }}
  admin-password: {{ .Values.monitoring.grafana.adminPassword | default "admin" | quote }}
  admin-user: {{ .Values.monitoring.grafana.adminUser | default "admin" | quote }}
  {{- else }}
  admin-password: {{ .Values.monitoring.grafana.adminPassword | required "Grafana adminPassword должен быть указан в values.yaml или Vault для продакшена!" | quote }}
  admin-user: {{ .Values.monitoring.grafana.adminUser | required "Grafana adminUser должен быть указан в values.yaml или Vault для продакшена!" | quote }}
  {{- end }}
{{- end }}

