{{- if (index .Values.services "interviewer-agent-service").enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tensor-talks.fullname" . }}-interviewer-agent-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
    app.kubernetes.io/component: interviewer-agent-service
spec:
  replicas: {{ (index .Values.services "interviewer-agent-service").replicaCount }}
  selector:
    matchLabels:
      {{- include "tensor-talks.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: interviewer-agent-service
  template:
    metadata:
      labels:
        {{- include "tensor-talks.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: interviewer-agent-service
        team: tensor-talks
        project: tensor-talks
      annotations:
        tensor-talks.com/agent-service-revision: "2026-01-19-fix-question-index"
        prometheus.io/scrape: "true"
        prometheus.io/port: "9092"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "tensor-talks.serviceAccountName" . }}
{{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: interviewer-agent-service
          image: {{ include "tensor-talks.image" (dict "Values" .Values "repository" (index .Values.services "interviewer-agent-service").image.repository "tag" (index .Values.services "interviewer-agent-service").image.tag) }}
          imagePullPolicy: {{ (index .Values.services "interviewer-agent-service").image.pullPolicy | default (include "tensor-talks.imagePullPolicy" .Values) }}
          ports:
            - name: http
              containerPort: 8093
              protocol: TCP
            - name: metrics
              containerPort: 9092
              protocol: TCP
          env:
            - name: AGENT_SERVICE_NAME
              value: "interviewer-agent-service"
            - name: AGENT_SERVICE_VERSION
              value: "1.0.0"
            - name: LOG_LEVEL
              value: "INFO"
            - name: LOG_FORMAT
              value: "json"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: KAFKA_TOPIC_MESSAGES_FULL
              value: "tensor-talks-messages.full.data"
            - name: KAFKA_TOPIC_GENERATED
              value: "tensor-talks-generated.phrases"
            - name: KAFKA_TOPIC_SESSION_COMPLETED
              value: "tensor-talks-session.completed"
            - name: KAFKA_CONSUMER_GROUP
              value: "tensor-talks-agent-service-group"
            - name: KAFKA_CONSUMER_AUTO_OFFSET_RESET
              value: "earliest"
            - name: KAFKA_CONSUMER_ENABLE_AUTO_COMMIT
              value: "false"
            - name: KAFKA_CONSUMER_MAX_POLL_RECORDS
              value: "100"
            - name: KAFKA_PRODUCER_ACKS
              value: "all"
            - name: KAFKA_PRODUCER_RETRIES
              value: "3"
            - name: KAFKA_PRODUCER_COMPRESSION_TYPE
              value: "snappy"
            - name: LLM_PROVIDER
              value: {{ (index .Values.services "interviewer-agent-service").llm.provider | default "openai" | quote }}
            - name: LLM_BASE_URL
              value: {{ (index .Values.services "interviewer-agent-service").llm.baseUrl | default "" | quote }}
            {{- if .Values.vault.enabled }}
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tensor-talks.fullname" . }}-llm-secret
                  key: api-key
            {{- else }}
            - name: LLM_API_KEY
              value: {{ (index .Values.services "interviewer-agent-service").llm.apiKey | default "" | quote }}
            {{- end }}
            - name: LLM_MODEL
              value: {{ (index .Values.services "interviewer-agent-service").llm.model | default "gpt-4o-mini" | quote }}
            - name: LLM_TEMPERATURE
              value: {{ (index .Values.services "interviewer-agent-service").llm.temperature | default "0.7" | quote }}
            - name: LLM_MAX_TOKENS
              value: {{ (index .Values.services "interviewer-agent-service").llm.maxTokens | default "2000" | quote }}
            - name: LLM_TIMEOUT
              value: {{ (index .Values.services "interviewer-agent-service").llm.timeout | default "60" | quote }}
            - name: SESSION_SERVICE_URL
              value: "http://{{ include "tensor-talks.fullname" . }}-session-service:8083"
            - name: CHAT_CRUD_SERVICE_URL
              value: "http://{{ include "tensor-talks.fullname" . }}-chat-crud-service:8087"
            - name: KNOWLEDGE_BASE_CRUD_SERVICE_URL
              value: "http://{{ include "tensor-talks.fullname" . }}-knowledge-base-crud-service:8090"
            - name: REDIS_HOST
              value: {{ .Values.redis.host | default (printf "%s-redis" (include "tensor-talks.fullname" .)) | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | default "6379" | quote }}
            - name: REDIS_DB
              value: {{ .Values.redis.db | default "0" | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "tensor-talks.fullname" . }}-redis-secret
                  key: password
                  optional: true
            - name: REDIS_MAX_CONNECTIONS
              value: "50"
            - name: REDIS_CONNECTION_TIMEOUT
              value: "5"
            - name: REDIS_SOCKET_TIMEOUT
              value: "5"
            - name: REDIS_RETRY_ON_TIMEOUT
              value: "true"
            - name: ENABLE_REDIS_CACHE
              value: "true"
            - name: MAX_RETRIES
              value: "3"
            - name: PROCESSING_TIMEOUT
              value: "120"
            - name: MAX_CLARIFICATIONS
              value: {{ (index .Values.services "interviewer-agent-service").maxClarifications | default 3 | quote }}
            - name: REST_API_HOST
              value: "0.0.0.0"
            - name: REST_API_PORT
              value: "8093"
            - name: ENABLE_REST_API
              value: "true"
            - name: METRICS_PORT
              value: "9092"
            - name: ENABLE_PROMETHEUS
              value: "true"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml (index .Values.services "interviewer-agent-service").resources | nindent 12 }}
{{- end }}
