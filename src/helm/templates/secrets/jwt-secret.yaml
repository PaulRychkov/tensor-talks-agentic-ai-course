{{- if not .Values.vault.enabled }}
# ВАЖНО: Этот Secret создается только если vault.enabled = false
# Для продакшена рекомендуется использовать Vault (vault.enabled = true)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tensor-talks.fullname" . }}-jwt
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ВАЖНО: Все секреты должны храниться в Vault!
  # Для локальной разработки (localDevelopment: true) можно использовать дефолты
  # В продакшене (localDevelopment: false) ОБЯЗАТЕЛЬНО из Vault!
  {{- if .Values.localDevelopment }}
  secret: {{ (index .Values.services "auth-service").jwt.secret | default (printf "dev-jwt-secret-%s" .Release.Name) | quote }}
  {{- else }}
  secret: {{ (index .Values.services "auth-service").jwt.secret | required "JWT secret должен быть указан в values.yaml или Vault для продакшена!" | quote }}
  {{- end }}
  issuer: {{ (index .Values.services "auth-service").jwt.issuer | quote }}
  audience: {{ (index .Values.services "auth-service").jwt.audience | quote }}
{{- end }}

