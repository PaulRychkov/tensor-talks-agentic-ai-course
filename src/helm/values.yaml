    replicaCount: 1
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
    jwt:
      # ВАЖНО: Если vault.enabled = true, все значения берутся из Vault через External Secrets
      # Значения из Vault: tensor-talks/jwt (secret, issuer, audience)
      secret: ""  # Берется из Vault если vault.enabled = true
      issuer: tensor-talks-auth  # Берется из Vault если vault.enabled = true
      audience: tensor-talks-services  # Берется из Vault если vault.enabled = true
