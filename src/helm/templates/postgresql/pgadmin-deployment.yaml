{{- if and .Values.postgresql.deployment.enabled .Values.postgresql.pgadmin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tensor-talks.fullname" . }}-pgadmin
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgadmin
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "tensor-talks.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pgadmin
  template:
    metadata:
      labels:
        {{- include "tensor-talks.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pgadmin
    spec:
      containers:
        - name: pgadmin
          image: {{ .Values.postgresql.pgadmin.image.repository }}:{{ .Values.postgresql.pgadmin.image.tag }}
          imagePullPolicy: {{ .Values.postgresql.pgadmin.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.postgresql.pgadmin.port | default 80 }}
              protocol: TCP
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              value: {{ .Values.postgresql.pgadmin.email | default "admin@tensor-talks.local" }}
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "tensor-talks.fullname" . }}-pgadmin
                  key: password
            - name: PGADMIN_CONFIG_SERVER_MODE
              value: "False"
          resources:
            {{- toYaml .Values.postgresql.pgadmin.resources | nindent 12 }}
          volumeMounts:
            - name: pgadmin-data
              mountPath: /var/lib/pgadmin
          livenessProbe:
            httpGet:
              path: /misc/ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /misc/ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: pgadmin-data
          emptyDir: {}
{{- end }}
