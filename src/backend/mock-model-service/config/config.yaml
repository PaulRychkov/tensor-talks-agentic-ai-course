server:
  host: "0.0.0.0"
  port: 8084

kafka:
  brokers: "kafka:9092"
  topic_chat_out: "chat.events.out"
  topic_chat_in: "chat.events.in"
  consumer_group: "mock-model-service-group"
  topic_messages_full: "messages.full.data"
  topic_generated_phrases: "generated.phrases"
  agent_consumer_group: "mock-model-service-agent-group"

model:
  question_delay_seconds: 2

session_manager:
  base_url: "http://session-service:8083"
  timeout_seconds: 5

chat_crud:
  base_url: "http://chat-crud-service:8087"
  timeout_seconds: 5

results_crud:
  base_url: "http://results-crud-service:8088"
  timeout_seconds: 5

redis:
  addr: "redis:6379"
  password: ""
  db: 0
