{{- if .Values.vault.enabled }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-tensor-talks
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: {{ if .Values.vault.deployment.enabled }}http://{{ include "tensor-talks.fullname" . }}-vault.{{ .Values.global.namespace }}:8200{{ else }}{{ .Values.vault.server }}{{ end }}
      path: {{ .Values.vault.path | default "kv" }}
      version: {{ .Values.vault.version | default "v2" }}
      auth:
        {{- if .Values.vault.deployment.enabled }}
        # Для локального Vault используем токен
        tokenSecretRef:
          name: {{ include "tensor-talks.fullname" . }}-vault
          key: root-token
        {{- else }}
        # Для внешнего Vault используем Kubernetes auth
        kubernetes:
          mountPath: {{ .Values.vault.auth.mountPath | default "kubernetes" }}
          role: {{ .Values.vault.auth.role | default "tensor-talks" }}
          serviceAccountRef:
            name: {{ include "tensor-talks.serviceAccountName" . }}
        {{- end }}
{{- end }}
