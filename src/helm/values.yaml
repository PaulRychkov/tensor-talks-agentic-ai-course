# Конфигурация Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Cloudflare автоматически предоставляет SSL, поэтому можем использовать HTTP внутри
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
  hosts:
    - host: tensor-talks.ru
      paths:
        - path: /
          pathType: Prefix
    # Опционально: поддержка www поддомена
    - host: www.tensor-talks.ru
      paths:
        - path: /
          pathType: Prefix
  # TLS опционален, так как Cloudflare предоставляет SSL
  # Если хотите использовать TLS внутри кластера, раскомментируйте:
  # tls:
  #   - hosts:
  #       - tensor-talks.ru
  #       - www.tensor-talks.ru
  #     secretName: tls-secret

# Конфигурация Istio для Circuit Breaker
istio:
  enabled: true  # Включить Istio для Circuit Breaker
  injection:
    enabled: true  # Включить автоматический injection sidecar в поды

# ServiceMonitor для Prometheus
# ServiceMonitor - это Custom Resource Definition (CRD) от Prometheus Operator
# Создается в нашем namespace для сбора метрик нашим Prometheus
serviceMonitor:
  enabled: false  # Отключено - используем статическую конфигурацию Prometheus (не требуется Prometheus Operator)
  namespace: tensor-talks
  interval: 15s
  scrapeTimeout: 10s

# ServiceAccount
serviceAccount:
  create: true
  annotations: {}

# Контекст безопасности Pod
podSecurityContext:
  fsGroup: 2000

# Контекст безопасности
securityContext:
  runAsNonRoot: true
  runAsUser: 1000

