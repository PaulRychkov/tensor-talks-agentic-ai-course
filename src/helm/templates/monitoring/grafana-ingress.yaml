{{- if and .Values.monitoring.grafana.enabled .Values.monitoring.grafana.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tensor-talks.fullname" . }}-grafana
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
  {{- with .Values.monitoring.grafana.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.monitoring.grafana.ingress.className }}
  ingressClassName: {{ .Values.monitoring.grafana.ingress.className }}
  {{- end }}
  {{- if .Values.monitoring.grafana.ingress.tls }}
  tls:
    {{- range .Values.monitoring.grafana.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.monitoring.grafana.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "tensor-talks.fullname" $ }}
                port:
                  number: 3000
          {{- end }}
    {{- end }}
{{- end }}

