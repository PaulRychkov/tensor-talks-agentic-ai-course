{{- if not .Values.vault.enabled }}
# ВАЖНО: Этот Secret создается только если vault.enabled = false
# Для продакшена рекомендуется использовать Vault (vault.enabled = true)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tensor-talks.fullname" . }}-postgres
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tensor-talks.labels" . | nindent 4 }}
type: Opaque
stringData:
  host: {{ .Values.postgresql.host | quote }}
  port: {{ .Values.postgresql.port | quote }}
  database: {{ .Values.postgresql.database | quote }}
  user: {{ .Values.postgresql.user | quote }}
  password: {{ .Values.postgresql.password | quote }}
  sslmode: {{ .Values.postgresql.sslMode | quote }}
{{- end }}

