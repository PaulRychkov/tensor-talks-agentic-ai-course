services:
  # Single PostgreSQL instance with multiple schemas for local development
  # In Kubernetes, we use shared PostgreSQL: 79.174.89.43:18809/team10_db
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/create_schemas.sql:/docker-entrypoint-initdb.d/create_schemas.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis-sessions:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis_sessions_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  user-crud-service:
    build:
      context: ./backend/user-crud-service
      network: host
    environment:
      USER_CRUD_DATABASE_HOST: postgres
      USER_CRUD_DATABASE_PORT: "5432"
      USER_CRUD_DATABASE_USER: postgres
      USER_CRUD_DATABASE_PASSWORD: postgres
      USER_CRUD_DATABASE_NAME: postgres
      USER_CRUD_DATABASE_SSL_MODE: disable
      USER_CRUD_DATABASE_SCHEMA: user_crud
      USER_CRUD_SERVER_HOST: "0.0.0.0"
      USER_CRUD_SERVER_PORT: "8082"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"

  auth-service:
    build:
      context: ./backend/auth-service
      network: host
    environment:
      AUTH_SERVER_HOST: "0.0.0.0"
      AUTH_SERVER_PORT: "8081"
      AUTH_USER_STORE_BASE_URL: http://user-crud-service:8082
      AUTH_USER_STORE_TIMEOUT_SECONDS: "5"
      AUTH_JWT_SECRET: supersecretjwtkey
      AUTH_JWT_ACCESS_TOKEN_TTL: 15m
      AUTH_JWT_REFRESH_TOKEN_TTL: 720h
      AUTH_JWT_ISSUER: tensor-talks-auth
      AUTH_JWT_AUDIENCE: tensor-talks-services
    depends_on:
      user-crud-service:
        condition: service_started
    ports:
      - "8081:8081"

  admin-bff-service:
    build:
      context: ./backend/admin-bff-service
      network: host
    environment:
      ADMIN_BFF_SERVER_HOST: "0.0.0.0"
      ADMIN_BFF_SERVER_PORT: "8096"
      ADMIN_BFF_JWT_SECRET: supersecretjwtkey
      ADMIN_BFF_AUTH_SERVICE_BASE_URL: http://auth-service:8081
      ADMIN_BFF_USER_CRUD_SERVICE_BASE_URL: http://user-crud-service:8082
      ADMIN_BFF_KNOWLEDGE_PRODUCER_SERVICE_BASE_URL: http://knowledge-producer-service:8092
      ADMIN_BFF_KNOWLEDGE_BASE_CRUD_SERVICE_BASE_URL: http://knowledge-base-crud-service:8090
      ADMIN_BFF_QUESTIONS_CRUD_SERVICE_BASE_URL: http://questions-crud-service:8091
      ADMIN_BFF_RESULTS_CRUD_SERVICE_BASE_URL: http://results-crud-service:8088
      ADMIN_BFF_PROMETHEUS_URL: http://prometheus:9090
      ADMIN_BFF_ADMIN_SECRET: "tt-admin-secret-2026"
    depends_on:
      auth-service:
        condition: service_started
      user-crud-service:
        condition: service_started
    ports:
      - "8096:8096"

  admin-frontend:
    build:
      context: ./admin-frontend
      network: host
    ports:
      - "8097:80"
    depends_on:
      - admin-bff-service

  session-crud-service:
    build:
      context: ./backend/session-crud-service
      network: host
    environment:
      SESSION_CRUD_SERVER_HOST: "0.0.0.0"
      SESSION_CRUD_SERVER_PORT: "8085"
      SESSION_CRUD_DATABASE_HOST: postgres
      SESSION_CRUD_DATABASE_PORT: "5432"
      SESSION_CRUD_DATABASE_USER: postgres
      SESSION_CRUD_DATABASE_PASSWORD: postgres
      SESSION_CRUD_DATABASE_NAME: postgres
      SESSION_CRUD_DATABASE_SSL_MODE: disable
      SESSION_CRUD_DATABASE_SCHEMA: session_crud
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8085:8085"

  chat-crud-service:
    build:
      context: ./backend/chat-crud-service
      network: host
    environment:
      CHAT_CRUD_SERVER_HOST: "0.0.0.0"
      CHAT_CRUD_SERVER_PORT: "8087"
      CHAT_CRUD_DATABASE_HOST: postgres
      CHAT_CRUD_DATABASE_PORT: "5432"
      CHAT_CRUD_DATABASE_USER: postgres
      CHAT_CRUD_DATABASE_PASSWORD: postgres
      CHAT_CRUD_DATABASE_NAME: postgres
      CHAT_CRUD_DATABASE_SSL_MODE: disable
      CHAT_CRUD_DATABASE_SCHEMA: chat_crud
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8087:8087"

  results-crud-service:
    build:
      context: ./backend/results-crud-service
      network: host
    environment:
      RESULTS_CRUD_SERVER_HOST: "0.0.0.0"
      RESULTS_CRUD_SERVER_PORT: "8088"
      RESULTS_CRUD_DATABASE_HOST: postgres
      RESULTS_CRUD_DATABASE_PORT: "5432"
      RESULTS_CRUD_DATABASE_USER: postgres
      RESULTS_CRUD_DATABASE_PASSWORD: postgres
      RESULTS_CRUD_DATABASE_NAME: postgres
      RESULTS_CRUD_DATABASE_SSL_MODE: disable
      RESULTS_CRUD_DATABASE_SCHEMA: results_crud
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8088:8088"

  knowledge-base-crud-service:
    build:
      context: ./backend/knowledge-base-crud-service
      network: host
    environment:
      KNOWLEDGE_BASE_CRUD_SERVER_HOST: "0.0.0.0"
      KNOWLEDGE_BASE_CRUD_SERVER_PORT: "8090"
      KNOWLEDGE_BASE_CRUD_DATABASE_HOST: postgres
      KNOWLEDGE_BASE_CRUD_DATABASE_PORT: "5432"
      KNOWLEDGE_BASE_CRUD_DATABASE_USER: postgres
      KNOWLEDGE_BASE_CRUD_DATABASE_PASSWORD: postgres
      KNOWLEDGE_BASE_CRUD_DATABASE_NAME: postgres
      KNOWLEDGE_BASE_CRUD_DATABASE_SSL_MODE: disable
      KNOWLEDGE_BASE_CRUD_DATABASE_SCHEMA: knowledge_base_crud
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8090:8090"

  questions-crud-service:
    build:
      context: ./backend/questions-crud-service
      network: host
    environment:
      QUESTIONS_CRUD_SERVER_HOST: "0.0.0.0"
      QUESTIONS_CRUD_SERVER_PORT: "8091"
      QUESTIONS_CRUD_DATABASE_HOST: postgres
      QUESTIONS_CRUD_DATABASE_PORT: "5432"
      QUESTIONS_CRUD_DATABASE_USER: postgres
      QUESTIONS_CRUD_DATABASE_PASSWORD: postgres
      QUESTIONS_CRUD_DATABASE_NAME: postgres
      QUESTIONS_CRUD_DATABASE_SSL_MODE: disable
      QUESTIONS_CRUD_DATABASE_SCHEMA: questions_crud
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8091:8091"

  knowledge-producer-service:
    build:
      context: .
      dockerfile: backend/knowledge-producer-service/Dockerfile
      network: host
    environment:
      KNOWLEDGE_BASE_CRUD_URL: http://knowledge-base-crud-service:8090
      QUESTIONS_CRUD_URL: http://questions-crud-service:8091
      KNOWLEDGE_DATA_PATH: /app/data/knowledge
      QUESTIONS_DATA_PATH: /app/data/questions
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8092"
      AUTO_LOAD_ON_STARTUP: "true"
      STARTUP_LOAD_RETRY_DELAY: "5"
      STARTUP_LOAD_MAX_RETRIES: "10"
      # LLM (knowledge-producer: GPT-5.4 heavy, GPT-5.4-mini standard, GPT-5.4-nano simple)
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${KNOWLEDGE_PRODUCER_LLM_MODEL:-gpt-5.4}
      LLM_MODEL_MINI: ${KNOWLEDGE_PRODUCER_LLM_MODEL_MINI:-gpt-5.4-mini}
      LLM_MODEL_NANO: ${KNOWLEDGE_PRODUCER_LLM_MODEL_NANO:-gpt-5.4-nano}
    volumes:
      - ./backend/common/knowledge:/app/data/knowledge:ro
      - ./backend/common/questions:/app/data/questions:ro
    depends_on:
      knowledge-base-crud-service:
        condition: service_started
      questions-crud-service:
        condition: service_started
    ports:
      - "8092:8092"

  interview-builder-service:
    build:
      context: ./backend/interview-builder-service
      network: host
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_REQUEST: tensor-talks-interview.build.request
      KAFKA_TOPIC_RESPONSE: tensor-talks-interview.build.response
      KAFKA_CONSUMER_GROUP: tensor-talks-interview-builder-service-group
      QUESTIONS_CRUD_URL: http://questions-crud-service:8091
      KNOWLEDGE_BASE_CRUD_URL: http://knowledge-base-crud-service:8090
      RESULTS_CRUD_URL: http://results-crud-service:8088
      QUESTIONS_PER_INTERVIEW: "5"
      # LLM (interview-builder: GPT-5.4-mini main, GPT-5.4-nano light)
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${INTERVIEW_BUILDER_LLM_MODEL:-gpt-5.4-mini}
      LLM_MODEL_NANO: ${INTERVIEW_BUILDER_LLM_MODEL_NANO:-gpt-5.4-nano}
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8089"
    depends_on:
      kafka:
        condition: service_healthy
      questions-crud-service:
        condition: service_started
      knowledge-base-crud-service:
        condition: service_started
    ports:
      - "8089:8089"

  session-service:
    build:
      context: ./backend/session-service
      network: host
    environment:
      SESSION_SERVER_HOST: "0.0.0.0"
      SESSION_SERVER_PORT: "8083"
      SESSION_REDIS_ADDR: redis-sessions:6379
      SESSION_REDIS_PASSWORD: ""
      SESSION_REDIS_DB: "0"
      SESSION_REDIS_TTL_HOURS: "24"
      SESSION_SESSION_CRUD_BASE_URL: http://session-crud-service:8085
      SESSION_SESSION_CRUD_TIMEOUT_SECONDS: "5"
      SESSION_KAFKA_BROKERS: kafka:9092
      SESSION_KAFKA_TOPIC_REQUEST: tensor-talks-interview.build.request
      SESSION_KAFKA_TOPIC_RESPONSE: tensor-talks-interview.build.response
      SESSION_KAFKA_CONSUMER_GROUP: tensor-talks-session-manager-service-group
      SESSION_SESSION_MANAGER_MAX_ACTIVE_SESSIONS: "100"
      SESSION_SESSION_MANAGER_PROGRAM_TIMEOUT_SECONDS: "30"
    depends_on:
      redis-sessions:
        condition: service_healthy
      session-crud-service:
        condition: service_started
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"

  bff-service:
    build:
      context: ./backend/bff-service
      network: host
    environment:
      BFF_SERVER_HOST: "0.0.0.0"
      BFF_SERVER_PORT: "8080"
      BFF_AUTH_SERVICE_BASE_URL: http://auth-service:8081
      BFF_AUTH_SERVICE_TIMEOUT_SECONDS: "5"
      BFF_SESSION_SERVICE_BASE_URL: http://session-service:8083
      BFF_SESSION_SERVICE_TIMEOUT_SECONDS: "5"
      BFF_SESSION_CRUD_BASE_URL: http://session-crud-service:8085
      BFF_SESSION_CRUD_TIMEOUT_SECONDS: "5"
      BFF_CHAT_CRUD_BASE_URL: http://chat-crud-service:8087
      BFF_CHAT_CRUD_TIMEOUT_SECONDS: "5"
      BFF_RESULTS_CRUD_BASE_URL: http://results-crud-service:8088
      BFF_RESULTS_CRUD_TIMEOUT_SECONDS: "5"
      BFF_KAFKA_BROKERS: kafka:9092
      BFF_KAFKA_TOPIC_CHAT_OUT: tensor-talks-chat.events.out
      BFF_KAFKA_TOPIC_CHAT_IN: tensor-talks-chat.events.in
      BFF_KAFKA_CONSUMER_GROUP: tensor-talks-bff-service-group
      BFF_REDIS_ADDR: "redis:6379"
      BFF_REDIS_PASSWORD: ""
      BFF_REDIS_DB: "0"
      BFF_CORS_ALLOW_ORIGINS: "*"
      BFF_CORS_ALLOW_HEADERS: Authorization,Content-Type
    depends_on:
      auth-service:
        condition: service_started
      session-service:
        condition: service_started
      session-crud-service:
        condition: service_started
      chat-crud-service:
        condition: service_started
      results-crud-service:
        condition: service_started
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      network: host
    environment:
      VITE_API_BASE_URL: /api
    depends_on:
      bff-service:
        condition: service_started
    ports:
      - "5173:80"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    depends_on:
      - auth-service
      - bff-service
      - user-crud-service
      - session-service
      - session-crud-service
      - chat-crud-service
      - results-crud-service
      - knowledge-base-crud-service
      - questions-crud-service
      - interview-builder-service
      - dialogue-aggregator
      - interviewer-agent-service
      - analyst-agent-service
      - knowledge-producer-service
      - admin-bff-service

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:latest
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
      SERVER_PORT: 9000
      JVM_OPTS: "-Xms32M -Xmx64M"
    ports:
      - "9000:9000"
    depends_on:
      - kafka

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  dialogue-aggregator:
    build:
      context: ./backend/dialogue-aggregator
      network: host
    environment:
      DIALOGUE_AGGREGATOR_SERVER_HOST: "0.0.0.0"
      DIALOGUE_AGGREGATOR_SERVER_PORT: "8084"
      DIALOGUE_AGGREGATOR_KAFKA_BROKERS: kafka:9092
      DIALOGUE_AGGREGATOR_KAFKA_TOPIC_CHAT_OUT: tensor-talks-chat.events.out
      DIALOGUE_AGGREGATOR_KAFKA_TOPIC_CHAT_IN: tensor-talks-chat.events.in
      DIALOGUE_AGGREGATOR_KAFKA_CONSUMER_GROUP: tensor-talks-dialogue-aggregator-group
      DIALOGUE_AGGREGATOR_KAFKA_TOPIC_MESSAGES_FULL: tensor-talks-messages.full.data
      DIALOGUE_AGGREGATOR_KAFKA_TOPIC_GENERATED_PHRASES: tensor-talks-generated.phrases
      DIALOGUE_AGGREGATOR_KAFKA_AGENT_CONSUMER_GROUP: tensor-talks-dialogue-aggregator-agent-group
      DIALOGUE_AGGREGATOR_KAFKA_TOPIC_SESSION_COMPLETED: tensor-talks-session.completed
      DIALOGUE_AGGREGATOR_MODEL_QUESTION_DELAY_SECONDS: "2"
      DIALOGUE_AGGREGATOR_SESSION_MANAGER_BASE_URL: http://session-service:8083
      DIALOGUE_AGGREGATOR_SESSION_MANAGER_TIMEOUT_SECONDS: "5"
      DIALOGUE_AGGREGATOR_CHAT_CRUD_BASE_URL: http://chat-crud-service:8087
      DIALOGUE_AGGREGATOR_CHAT_CRUD_TIMEOUT_SECONDS: "5"
      DIALOGUE_AGGREGATOR_RESULTS_CRUD_BASE_URL: http://results-crud-service:8088
      DIALOGUE_AGGREGATOR_RESULTS_CRUD_TIMEOUT_SECONDS: "5"
    depends_on:
      session-service:
        condition: service_started
      chat-crud-service:
        condition: service_started
      results-crud-service:
        condition: service_started
      kafka:
        condition: service_healthy
    ports:
      - "8084:8084"

  interviewer-agent-service:
    build:
      context: ./backend/interviewer-agent-service
      network: host
    environment:
      # Service
      AGENT_SERVICE_NAME: interviewer-agent-service
      AGENT_SERVICE_VERSION: 1.0.0
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_MESSAGES_FULL: tensor-talks-messages.full.data
      KAFKA_TOPIC_GENERATED: tensor-talks-generated.phrases
      KAFKA_TOPIC_SESSION_COMPLETED: tensor-talks-session.completed
      KAFKA_CONSUMER_GROUP: tensor-talks-agent-service-group
      KAFKA_CONSUMER_AUTO_OFFSET_RESET: earliest
      KAFKA_CONSUMER_ENABLE_AUTO_COMMIT: "false"
      KAFKA_CONSUMER_MAX_POLL_RECORDS: 100
      KAFKA_PRODUCER_ACKS: all
      KAFKA_PRODUCER_RETRIES: 3
      KAFKA_PRODUCER_COMPRESSION_TYPE: snappy
      # LLM (interviewer: GPT-5.4-mini main, GPT-5.4-nano summarization)
      LLM_PROVIDER: openai
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${INTERVIEWER_LLM_MODEL:-gpt-5.4-mini}
      LLM_MODEL_NANO: ${INTERVIEWER_LLM_MODEL_NANO:-gpt-5.4-nano}
      LLM_TEMPERATURE: 0.7
      LLM_MAX_TOKENS: 2000
      LLM_TIMEOUT: 60
      # External Services
      SESSION_SERVICE_URL: http://session-service:8083
      CHAT_CRUD_SERVICE_URL: http://chat-crud-service:8087
      KNOWLEDGE_BASE_CRUD_SERVICE_URL: http://knowledge-base-crud-service:8090
      # Redis
      REDIS_HOST: redis-sessions
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      REDIS_MAX_CONNECTIONS: 50
      REDIS_CONNECTION_TIMEOUT: 5
      REDIS_SOCKET_TIMEOUT: 5
      REDIS_RETRY_ON_TIMEOUT: "true"
      ENABLE_REDIS_CACHE: "true"
      # Processing
      MAX_RETRIES: 3
      PROCESSING_TIMEOUT: 120
      # REST API
      REST_API_HOST: 0.0.0.0
      REST_API_PORT: 8093
      ENABLE_REST_API: "true"
      # Metrics
      METRICS_PORT: 9092
      ENABLE_PROMETHEUS: "true"
    depends_on:
      kafka:
        condition: service_healthy
      redis-sessions:
        condition: service_healthy
      session-service:
        condition: service_started
    ports:
      - "8093:8093"  # REST API
      - "9192:9092"  # Metrics (avoid kafka host port)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  analyst-agent-service:
    build:
      context: ./backend/analyst-agent-service
      network: host
    environment:
      SERVICE_NAME: analyst-agent-service
      SERVICE_VERSION: 1.0.0
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_SESSION_COMPLETED: tensor-talks-session.completed
      KAFKA_CONSUMER_GROUP: tensor-talks-analyst-agent-service-group
      # LLM (analyst: GPT-5.4 heavy, GPT-5.4-mini standard, GPT-5.4-nano auxiliary)
      LLM_PROVIDER: openai
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${ANALYST_LLM_MODEL:-gpt-5.4}
      LLM_MODEL_MINI: ${ANALYST_LLM_MODEL_MINI:-gpt-5.4-mini}
      LLM_MODEL_NANO: ${ANALYST_LLM_MODEL_NANO:-gpt-5.4-nano}
      LLM_TEMPERATURE: 0.3
      LLM_MAX_TOKENS: 4000
      LLM_TIMEOUT: 120
      RESULTS_CRUD_SERVICE_URL: http://results-crud-service:8088
      SESSION_SERVICE_URL: http://session-service:8083
      CHAT_CRUD_SERVICE_URL: http://chat-crud-service:8087
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8094"
      METRICS_PORT: "9094"
    depends_on:
      kafka:
        condition: service_healthy
      results-crud-service:
        condition: service_started
    ports:
      - "8094:8094"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8094/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_sessions_data:
  prometheus_data:
  grafana_data:
  loki_data:

